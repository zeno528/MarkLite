<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="foldShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF0F6"/>
      <stop offset="1" stop-color="#D5DAE7"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A2D3A"/>
      <stop offset="1" stop-color="#0D0E14"/>
    </linearGradient>
  </defs>

  <!-- 纸张主体 + 折角 -->
  <path d="M130 50 L340 50 L460 170 L460 462 Q460 472 450 472 L140 472 Q130 472 130 462 Z"
        fill="#FFFFFF" stroke="#C4C9D6" stroke-width="6" stroke-linejoin="round"/>
  <path d="M340 50 L340 158 Q340 170 352 170 L460 170 Z"
        fill="url(#foldShade)" stroke="#C4C9D6" stroke-width="6" stroke-linejoin="round"/>

  <!-- 右半部分文档内容线（四条，第一条对齐色块上边框 y=252） -->
  <g stroke="#D5DAE7" stroke-width="9" stroke-linecap="round">
    <line x1="300" y1="252" x2="438" y2="252"/>
    <line x1="300" y1="282" x2="438" y2="282"/>
    <line x1="300" y1="312" x2="438" y2="312"/>
    <line x1="300" y1="342" x2="390" y2="342"/>
  </g>

  <!-- 左下角黑色品牌色块（左三分之一超出白纸边缘） -->
  <rect x="57" y="252" width="220" height="220" rx="26" fill="url(#badgeGrad)"/>

  <!-- 项目 logo 标记 -->
  <g fill="#FFFFFF" transform="translate(58,246.8) scale(0.45)">
    <path d="M288 368H224V256l-48 64-48-64V368H64V144h64l48 80 48-80h64Z"/>
    <path d="M384 368L304 256h48.05L352 144h64V256h48Z"/>
  </g>
</svg>
