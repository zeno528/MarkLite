<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- 文档外形（含右上折角，单笔连写） -->
  <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
  <!-- 折角折痕 -->
  <path d="M14 3v4a2 2 0 0 0 2 2h4"/>

  <!-- M↓ 徽章（currentColor 实心填充） -->
  <rect x="5" y="7.5" width="14" height="7" rx="1.5" fill="currentColor" stroke="none"/>

  <!-- M 字符（白色 stroke，在 currentColor 徽章上作为反色镂空） -->
  <path d="M7.6 12.5V9.5L9 11.5L10.4 9.5V12.5" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ↓ 字符（白色 stroke） -->
  <path d="M14 9.5V12.5M12.7 11.3L14 12.5L15.3 11.3" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 底部 3 条文字横线（最后一条短，模拟段落结束） -->
  <path d="M6.5 17h11"/>
  <path d="M6.5 19h11"/>
  <path d="M6.5 21h7"/>
</svg>
